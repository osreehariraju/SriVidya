<body>
  <div class="container">
    <div class="settings">
        <select id="mantram-select"></select>
        <button class="btn-add" onclick="addMantram()">+ New Mantram</button>
    </div>

    <div id="count-display">0</div>

    <div class="controls">
        <button class="btn-plus" onclick="changeCount(1)">+1</button>
        <button class="btn-plus" onclick="changeCount(9)">+9</button>
        <button class="btn-plus" onclick="changeCount(108)">+108</button>
        
        <button class="btn-minus" onclick="changeCount(-1)">-1</button>
        <button class="btn-minus" onclick="changeCount(-9)">-9</button>
        <button class="btn-minus" onclick="changeCount(-108)">-108</button>
    </div>
</div>
</body>
